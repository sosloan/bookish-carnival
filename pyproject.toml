[tool.pytest.ini_options]
testpaths = ["tests"]
# Base URL used by pytest-playwright's `page.goto("/...")` shorthand.
# Override at runtime: pytest --base-url http://localhost:8000
base_url = "https://apod.nasa.gov"
# Re-run flaky tests up to 2 times before marking them as failed.
# Requires pytest-rerunfailures; omit if not installed.
# reruns = 2
# Default browser (chromium | firefox | webkit).
# Override at runtime: pytest --browser firefox
# browser = "chromium"
# Always collect tracing artifacts so failures can be replayed.
# Options: "on" | "off" | "retain-on-failure"
# playwright_tracing = "retain-on-failure"
